tasks:
  install-deps:
    name: Install Java, Maven & Docker
    description: Install JDK 21, Maven, and Docker Engine into the base Ubuntu image.
    command: |
      set -e

      # Java 21
      if ! java -version 2>/dev/null; then
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends openjdk-21-jdk-headless
      fi

      # Maven
      if ! mvn -version 2>/dev/null; then
        sudo apt-get install -y --no-install-recommends maven
      fi

      # Docker
      if ! docker info 2>/dev/null; then
        curl -fsSL https://get.docker.com | sudo sh
        sudo usermod -aG docker $(whoami)
        sudo service docker start
      fi

      java -version && mvn -version && docker info | grep "Server Version"
    triggeredBy:
      - postDevcontainerStart

  build:
    name: Build
    description: Compile and package the project.
    command: mvn package -q -DskipTests
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - install-deps

services:
  temporal-stack:
    name: Temporal Stack
    description: Starts PostgreSQL, Temporal server, and Temporal Web UI via Docker Compose.
    commands:
      start: |
        sudo service docker start || true
        docker compose up -d
      ready: curl -sf http://localhost:8080
      stop: docker compose down

  worker:
    name: Order Worker
    description: Temporal worker polling the order-processing task queue.
    commands:
      start: |
        until curl -sf http://localhost:8080 > /dev/null 2>&1; do
          echo "Waiting for Temporal..."
          sleep 2
        done
        java -cp target/temporal-order-poc-1.0-SNAPSHOT.jar com.example.order.Worker
      stop: kill $(lsof -t -i:7233) 2>/dev/null || true
