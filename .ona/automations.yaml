tasks:
  install-deps:
    name: Install Java, Maven & Docker
    description: Install JDK 21, Maven, and Docker Engine into the base Ubuntu image.
    command: |
      set -e
      if ! java -version 2>/dev/null; then
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends openjdk-21-jdk-headless maven
      fi
      if ! temporal --version 2>/dev/null; then
        curl -sSf https://temporal.download/cli.sh | sh
        echo 'export PATH="$PATH:/home/vscode/.temporalio/bin"' >> ~/.bashrc
      fi
      java -version && mvn -version && temporal --version
    triggeredBy:
      - postDevcontainerStart

  build:
    name: Build
    description: Compile and package the project.
    command: mvn package -q -DskipTests
    triggeredBy:
      - postDevcontainerStart
    dependsOn:
      - install-deps

services:
  temporal-stack:
    name: Temporal Stack
    description: Starts Temporal dev server (in-process, no Docker required).
    commands:
      start: /home/vscode/.temporalio/bin/temporal server start-dev --port 7233 --ui-port 8080 --headless=false
      ready: curl -sf http://localhost:8080
      stop: pkill -f "temporal server start-dev" || true

  worker:
    name: Order Worker
    description: Temporal worker polling the order-processing task queue.
    commands:
      start: |
        until curl -sf http://localhost:8080 > /dev/null 2>&1; do
          echo "Waiting for Temporal..."
          sleep 2
        done
        java -cp /workspaces/temporalpoc/target/temporal-order-poc-1.0-SNAPSHOT.jar com.example.order.Worker
      stop: pkill -f "com.example.order.Worker" || true
